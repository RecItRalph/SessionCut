# Cross-platform build and publish for SessionCut.
#
# How to cut a release:
#   1. Bump the version in package.json (e.g. "1.0.1").
#   2. Commit and push.
#   3. Tag and push the tag:  git tag v1.0.1 && git push origin v1.0.1
#   4. This workflow runs Mac and Windows builds in parallel and publishes
#      both installers to a draft GitHub Release on this repo.
#   5. Visit the Releases page, edit the draft, write notes, and Publish.
#
# Auto-update is wired through electron-updater pointed at this repo's Releases,
# so once a release is published, every previously-installed copy of the app
# notices the update on next launch and downloads it.
#
# Notes:
#   - GITHUB_TOKEN is provided automatically; no secrets to configure.
#   - Mac builds are unsigned (no Apple Developer cert); first launch needs
#     right-click → Open to bypass Gatekeeper. Windows is unsigned similarly;
#     SmartScreen will warn until the binary builds reputation.
#   - Whisper-cli ships in shipped builds: compiled from source on Mac (with
#     Metal acceleration), prebuilt download on Windows. Whisper *models* are
#     downloaded on first use into userData/models, NOT bundled (1+ GB each).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  WHISPER_VERSION: '1.8.4'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile whisper-cli with Metal (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          mkdir -p bin
          curl -fsSL "https://github.com/ggerganov/whisper.cpp/archive/refs/tags/v${WHISPER_VERSION}.tar.gz" | tar xz
          cd "whisper.cpp-${WHISPER_VERSION}"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGGML_METAL=ON -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build build --config Release -j --target whisper-cli
          cp build/bin/whisper-cli ../bin/whisper
          chmod +x ../bin/whisper
          ../bin/whisper --help | head -3
          cd ..

      - name: Download whisper-cli prebuilt (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $url = "https://github.com/ggerganov/whisper.cpp/releases/download/v$env:WHISPER_VERSION/whisper-bin-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile whisper-bin.zip
          Expand-Archive -Path whisper-bin.zip -DestinationPath whisper-tmp -Force
          # The zip layout has shifted across releases — accept either name.
          $exe = Get-ChildItem -Path whisper-tmp -Filter 'whisper-cli.exe' -Recurse | Select-Object -First 1
          if ($null -eq $exe) {
            $exe = Get-ChildItem -Path whisper-tmp -Filter 'main.exe' -Recurse | Select-Object -First 1
          }
          if ($null -eq $exe) { throw 'whisper-cli.exe not found in archive' }
          Copy-Item $exe.FullName bin/whisper.exe
          # Some prebuilt zips also bundle ggml*.dll alongside the exe — copy them.
          Get-ChildItem -Path $exe.Directory -Filter '*.dll' | ForEach-Object {
            Copy-Item $_.FullName bin/
          }
          Get-ChildItem bin/

      - name: Build and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
